baseURL = "https://carysechang.github.io/portfolio/"
title = "Caryse's Portfolio"
languageCode = "en-us"
disableKinds = ["taxonomy", "term"]

[pagination]
pagerSize = 6

[module]
[[module.imports]]
path = "github.com/zetxek/adritian-free-hugo-theme"

[[module.mounts]]
source = "archetypes"
target = "archetypes"

[[module.mounts]]
source = "assets"
target = "assets"

[[module.mounts]]
source = "i18n"
target = "i18n"

[[module.mounts]]
source = "layouts"
target = "layouts"

[[module.mounts]]
source = "static"
target = "static"

[[module.mounts]]
source = "node_modules/bootstrap/scss"
target = "assets/scss/bootstrap"

[[module.mounts]]
source = "node_modules/bootstrap/dist/js"
target = "assets/js/bootstrap"

[[module.mounts]]
source = "node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"
target = "assets/js/vendor/bootstrap.bundle.min.js"

[[module.mounts]]
source = "node_modules/bootstrap-print-css/css/bootstrap-print.css"
target = "assets/css/bootstrap-print.css"

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true

[params]
title = "Caryse's Portfolio"
description = "A Hugo starter site for a pre-med undergraduate to showcase interests, research, and experience."
themeColor = "#4f7d8a"
colorScheme = "ocean"
homepageExperienceCount = 3
homepageAwardsCount = 3
homepageCertificationsCount = 3
homepageProjectCount = 2

[params.plugins]
[[params.plugins.css]]
URL = "css/adritian-icons.css"
[[params.plugins.css]]
URL = "css/bootstrap-print.css"
[[params.plugins.css]]
URL = "css/cv-resume.css"
[[params.plugins.css]]
URL = "css/education.css"
[[params.plugins.css]]
URL = "css/nav-dropdown.css"
[[params.plugins.css]]
URL = "css/site-overrides.css"

[[params.plugins.scss]]
URL = "scss/adritian.scss"

[[params.plugins.js]]
URL = "js/rad-animations.js"
[[params.plugins.js]]
URL = "js/sticky-header.js"
[[params.plugins.js]]
URL = "js/library/fontfaceobserver.js"
[[params.plugins.js]]
URL = "js/poster-lightbox.js"
[[params.plugins.js]]
URL = "js/showcase-about.js"

[params.colorSchemeSwitcher]
enable = false

[params.seo]
siteName = "Caryse's Portfolio"
siteDescription = "A personal academic portfolio built with Hugo for a pre-med undergraduate."

[params.seo.person]
name = "Caryse"
sections = ["home", "about", "education", "experience", "projects", "interests", "awards-honors", "certifications", "contact"]

[params.analytics]
vercelPageInsights = false
vercelAnalytics = false

[params.analytics.googleAnalytics]
code = ""
enabled = false

[params.analytics.googleTagManager]
code = ""
enabled = false

[params.languages.selector.disable]
footer = true
header = true
mobileHeader = true

[build]
writeStats = true

[build.buildStats]
enabledFor = ["scss"]
disableClasses = false
disableIDs = false
disableTags = false
enable = true

[languages]
[languages.en]
disabled = false
languageCode = "en"
languageDirection = "ltr"
languageName = "English"
title = "Caryse's Portfolio"
weight = 1

[languages.en.menus]
[[languages.en.menus.header]]
name = "Home"
URL = "/"
weight = 1

[[languages.en.menus.header]]
name = "Projects"
identifier = "projects"
URL = "/#projects"
weight = 2

[[languages.en.menus.header]]
name = "Research Papers"
parent = "projects"
URL = "/projects/research/"
weight = 1

[[languages.en.menus.header]]
name = "All projects"
parent = "projects"
URL = "/projects/"
weight = 2

[[languages.en.menus.header]]
name = "Experience"
URL = "/#experience"
weight = 3

[[languages.en.menus.header]]
name = "More"
identifier = "more"
URL = "/#awards-honors"
weight = 4

[[languages.en.menus.header]]
name = "Awards & Honors"
parent = "more"
URL = "/#awards-honors"
weight = 1

[[languages.en.menus.header]]
name = "Certifications"
parent = "more"
URL = "/#certifications"
weight = 2

[[languages.en.menus.header]]
name = "Resume"
URL = "/cv"
weight = 5

[[languages.en.menus.header]]
name = "Contact"
URL = "/#contact"
weight = 6

[[languages.en.menus.footer]]
name = "Home"
URL = "/"
weight = 1

[[languages.en.menus.footer]]
name = "Research & Projects"
URL = "/projects/"
weight = 2

[[languages.en.menus.footer]]
name = "Research"
URL = "/projects/research/"
weight = 3

[[languages.en.menus.footer]]
name = "Resume"
URL = "/cv"
weight = 4

[[languages.en.menus.footer]]
name = "Contact"
URL = "/#contact"
weight = 5
